name: Build FlySnap
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Theos and SDK
        run: |
          # دابەزاندنی تیۆس لە شوێنی پڕۆژەکە
          git clone --recursive https://github.com/theos/theos.git $GITHUB_WORKSPACE/theos
          
          # دابەزاندنی SDK بە شێوەیەکی پارێزراوتر
          mkdir -p $GITHUB_WORKSPACE/theos/sdks
          curl -L https://github.com/theos/sdks/raw/master/iPhoneOS14.5.sdk.tar.xz -o sdk.tar.xz
          tar -xf sdk.tar.xz -C $GITHUB_WORKSPACE/theos/sdks
          rm sdk.tar.xz

      - name: Build Tweak
        run: |
          export THEOS=$GITHUB_WORKSPACE/theos
          export PATH=$THEOS/bin:$PATH
          make package FINALPACKAGE=1
        env:
          THEOS: ${{ github.workspace }}/theos

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: FlySnap-Dylib
          path: packages/*.deb
