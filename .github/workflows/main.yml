name: Build FlySnap
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Theos
        uses: theos/setup-theos@master

      - name: Build Tweak
        run: |
          make package
        env:
          THEOS: ${{ github.workspace }}/theos

      - name: Upload Dylib
        uses: actions/upload-artifact@v4
        with:
          name: flysnap-dylib
          path: .theos/obj/debug/*.dylib
