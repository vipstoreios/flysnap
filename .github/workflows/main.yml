name: Build FlySnap
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: brew install ldid

      - name: Setup Theos and SDK
        run: |
          # دابەزاندنی تیۆس
          git clone --recursive https://github.com/theos/theos.git $GITHUB_WORKSPACE/theos
          
          # دابەزاندنی SDK بە ڕێگەی Clone (بۆ ئەوەی کێشەی tar نەمێنێت)
          mkdir -p $GITHUB_WORKSPACE/theos/sdks
          git clone https://github.com/theos/sdks.git $GITHUB_WORKSPACE/sdks-repo
          cp -r $GITHUB_WORKSPACE/sdks-repo/iPhoneOS14.5.sdk $GITHUB_WORKSPACE/theos/sdks/
          
      - name: Build Tweak
        run: |
          export THEOS=$GITHUB_WORKSPACE/theos
          export PATH=$THEOS/bin:$PATH
          make package FINALPACKAGE=1
        env:
          THEOS: ${{ github.workspace }}/theos

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: FlySnap-DEB
          path: packages/*.deb
