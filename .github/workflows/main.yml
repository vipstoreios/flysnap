name: Build FlySnap
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Theos
        run: |
          git clone --recursive https://github.com/theos/theos.git $GITHUB_WORKSPACE/theos
          # دابەزاندنی SDK بە شێوەیەک کە کێشەی فۆرماتی نەبێت
          mkdir -p $GITHUB_WORKSPACE/theos/sdks
          curl -ksL https://github.com/theos/sdks/raw/master/iPhoneOS14.5.sdk.tar.xz -o $GITHUB_WORKSPACE/theos/sdks/iPhoneOS14.5.sdk.tar.xz
          # بەکارهێنانی فەرمانی جیاواز بۆ کردنەوەی فایلەکە
          cd $GITHUB_WORKSPACE/theos/sdks
          python3 -c "import os; os.system('tar -xf iPhoneOS14.5.sdk.tar.xz')"

      - name: Build Tweak
        run: |
          export THEOS=$GITHUB_WORKSPACE/theos
          export PATH=$THEOS/bin:$PATH
          make package FINALPACKAGE=1
        env:
          THEOS: ${{ github.workspace }}/theos

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: FlySnap-Package
          path: packages/*.deb
