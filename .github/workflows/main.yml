name: Build FlySnap
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Theos and Dependencies
        run: |
          # دابەزاندنی ئامرازەکانی واژۆکردن
          brew install ldid xz
          
          # دابەزاندنی تیۆس
          git clone --recursive https://github.com/theos/theos.git $GITHUB_WORKSPACE/theos
          
          # دابەزاندنی SDK
          mkdir -p $GITHUB_WORKSPACE/theos/sdks
          curl -L https://github.com/theos/sdks/raw/master/iPhoneOS14.5.sdk.tar.xz -o sdk.tar.xz
          tar -xf sdk.tar.xz -C $GITHUB_WORKSPACE/theos/sdks
          rm sdk.tar.xz

      - name: Build Tweak
        run: |
          export THEOS=$GITHUB_WORKSPACE/theos
          export PATH=$THEOS/bin:$PATH
          # دروستکردنی فایلەکە بەبێ دروستکردنی پاکێجی deb بۆ خێرایی
          make
        env:
          THEOS: ${{ github.workspace }}/theos

      - name: Upload Dylib
        uses: actions/upload-artifact@v4
        with:
          name: FlySnap-Dylib
          path: .theos/obj/debug/flysnap.dylib
