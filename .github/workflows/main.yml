name: Build FlySnap
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Theos
        run: |
          export THEOS=$GITHUB_WORKSPACE/theos
          git clone --recursive https://github.com/theos/theos.git $THEOS
          curl -LO https://github.com/theos/sdks/raw/master/iPhoneOS14.5.sdk.tar.xz
          mkdir -p $THEOS/sdks
          tar -xf iPhoneOS14.5.sdk.tar.xz -C $THEOS/sdks
          rm iPhoneOS14.5.sdk.tar.xz

      - name: Build Tweak
        run: |
          export THEOS=$GITHUB_WORKSPACE/theos
          make package FINALPACKAGE=1
        env:
          THEOS: ${{ github.workspace }}/theos

      - name: Upload Dylib
        uses: actions/upload-artifact@v4
        with:
          name: flysnap-dylib
          path: .theos/obj/install/*.dylib
